spawner-shop:
  world: "world"
  x: 100
  y: 70
  z: 100

max-level: 5

messages:
  upgrade-confirm: "Tap again to upgrade spawner for {cost}"
  upgraded: "Spawner upgraded to level {level}"
  max-level: "Spawner already max level"
  not-enough-money: "You need {cost} to upgrade"

spawners:

  zombie:
    name: "Zombie Spawner"

    entity: zombie

    upgrade-costs:
      1: 1000
      2: 2000
      3: 3000
      4: 5000

    drops:
      - rotten_flesh:1:3
      - iron_ingot:0:1

  skeleton:
    name: "Skeleton Spawner"

    entity: skeleton

    upgrade-costs:
      1: 1000
      2: 2000
      3: 3000
      4: 5000

    drops:
      - bone:1:3
      - arrow:1:5
